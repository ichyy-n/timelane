<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Gantt bars representing timeline lanes -->
  <rect x="80" y="116" width="200" height="44" rx="10" fill="#A5B4FC" opacity="0.9"/>
  <rect x="152" y="192" width="248" height="44" rx="10" fill="#C4B5FD" opacity="0.9"/>
  <rect x="108" y="268" width="176" height="44" rx="10" fill="#818CF8" opacity="0.9"/>
  <rect x="188" y="344" width="224" height="44" rx="10" fill="#E0E7FF" opacity="0.9"/>
  <!-- Current time indicator (vertical dashed line with dot) -->
  <line x1="360" y1="92" x2="360" y2="412" stroke="#FCD34D" stroke-width="5" stroke-dasharray="10,7" opacity="0.85"/>
  <circle cx="360" cy="92" r="10" fill="#FCD34D"/>
</svg>
